name: Bump Version on Main

on:
  push:
    branches:
      - main

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Determine next version
        id: tag
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v1.1.0"
          fi
          echo "Latest tag: $LATEST"

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          if git rev-parse "$LATEST" >/dev/null 2>&1; then
            COMMITS=$(git log "${LATEST}..HEAD" --oneline)
          else
            COMMITS=$(git log HEAD --oneline)
          fi
          echo "Commits since ${LATEST}:"
          echo "$COMMITS"

          if echo "$COMMITS" | grep -qE '^[a-f0-9]+ feat(\([^)]+\))?!:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qE '^[a-f0-9]+ feat(\([^)]+\))?:'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Update version.php
        id: version
        run: |
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          RELEASE="${NEW_TAG#v}"

          TODAY="$(date +%Y%m%d)"
          CURRENT_BUILD=$(grep -oP '(?<=\$plugin->version = )\d+' version.php)
          CURRENT_DATE="${CURRENT_BUILD:0:8}"
          CURRENT_NN="${CURRENT_BUILD:8:2}"
          if [ "$CURRENT_DATE" = "$TODAY" ]; then
            NN=$(printf "%02d" $((10#$CURRENT_NN + 1)))
          else
            NN="01"
          fi
          BUILD="${TODAY}${NN}"

          sed -i "s/\$plugin->version = [0-9]\+;/\$plugin->version = $BUILD;/" version.php
          sed -i "s/\$plugin->release = '[^']*';/\$plugin->release = '$RELEASE';/" version.php

          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

          echo "version.php actualizado:"
          grep -E "version|release" version.php

      - name: Update CHANGELOG.md
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          ADDED=""
          FIXED=""
          CHANGED=""

          while IFS= read -r line; do
            MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
            if echo "$MSG" | grep -qE '^\[skip ci\]|^chore: bump version'; then
              continue
            elif echo "$MSG" | grep -qE '^feat(\([^)]+\))?!?:'; then
              CLEAN=$(echo "$MSG" | sed 's/^feat([^)]*): //;s/^feat: //')
              ADDED="$ADDED\n- $CLEAN"
            elif echo "$MSG" | grep -qE '^fix(\([^)]+\))?:'; then
              CLEAN=$(echo "$MSG" | sed 's/^fix([^)]*): //;s/^fix: //')
              FIXED="$FIXED\n- $CLEAN"
            else
              CLEAN=$(echo "$MSG" | sed 's/^[a-z]*([^)]*): //;s/^[a-z]*: //')
              CHANGED="$CHANGED\n- $CLEAN"
            fi
          done < <(git log "${LATEST}..HEAD" --oneline)

          TODAY=$(date +%Y-%m-%d)
          ENTRY="## [${NEW_TAG}] - ${TODAY}\n\n"
          if [ -n "$ADDED" ]; then
            ENTRY="${ENTRY}### Nuevas funcionalidades\n${ADDED}\n\n"
          fi
          if [ -n "$FIXED" ]; then
            ENTRY="${ENTRY}### Correcciones\n${FIXED}\n\n"
          fi
          if [ -n "$CHANGED" ]; then
            ENTRY="${ENTRY}### Otros cambios\n${CHANGED}\n\n"
          fi

          TMPFILE=$(mktemp)
          head -n 7 CHANGELOG.md > "$TMPFILE"
          echo -e "\n${ENTRY}" >> "$TMPFILE"
          tail -n +8 CHANGELOG.md >> "$TMPFILE"
          mv "$TMPFILE" CHANGELOG.md

      - name: Commit updated files
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.php CHANGELOG.md
          if git diff --staged --quiet; then
            echo "Sin cambios — omitiendo commit y release"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.new_tag }} (build ${{ steps.version.outputs.build }}) [skip ci]"
            git push
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.commit.outputs.skipped == 'false'
        run: |
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin ${{ steps.version.outputs.new_tag }}

      - name: Create GitHub Release
        if: steps.commit.outputs.skipped == 'false'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"

          # Extract changelog notes for this version
          NOTES=$(awk "/^## \[${NEW_TAG}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          [ -z "$NOTES" ] && NOTES="Ver CHANGELOG.md para detalles."

          # Build plugin zip (exclude dev files)
          cp -r "$GITHUB_WORKSPACE" /tmp/validador
          rm -rf /tmp/validador/.git /tmp/validador/.github /tmp/validador/.claude /tmp/validador/vendor
          rm -f /tmp/validador/CLAUDE.md /tmp/validador/CONTRIBUTING.md /tmp/validador/.gitignore
          rm -f /tmp/validador/composer.json /tmp/validador/composer.lock /tmp/validador/phpunit.xml
          cd /tmp
          zip -r "validador-${NEW_TAG}.zip" validador

          gh release create "${NEW_TAG}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${NEW_TAG}" \
            --notes "${NOTES}" \
            "/tmp/validador-${NEW_TAG}.zip"
